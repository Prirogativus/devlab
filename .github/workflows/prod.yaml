name: Prod Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - prod
    paths:
      - 'backend/**'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release tag
        id: get_tag
        run: |
          LATEST_TAG=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/release/tags?ordering=last_updated&page_size=1" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['results'][0]['name'])")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull release image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/release:${{ steps.get_tag.outputs.tag }}

      - name: Deploy to Container Apps (prod)
        run: |
          az containerapp update \
            --name ${{ vars.PROD_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/release:${{ steps.get_tag.outputs.tag }}