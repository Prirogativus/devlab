name: Dev Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration

  security:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-security.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-security.txt

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          directory: backend

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2

      - name: Run Semgrep
        run: semgrep --config=auto backend
          
      - name: Run Bandit
        run: bandit -r backend --skip B101
