name: Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - release
    paths:
      - "backend/**"

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-and-integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Run e2e tests on staging
        run: |
          cd backend
          pytest tests/e2e

  security:
    needs: e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-security.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-security.txt

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          directory: backend

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2

      - name: Run Semgrep
        run: semgrep --config=auto backend

      - name: Run Bandit
        run: bandit -r backend --skip B101

  deploy-staging:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/release:${{ github.sha }} backend/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/release:${{ github.sha }}

      - name: Deploy to Container Apps (staging)
        run: |
          az containerapp update \
            --name ${{ vars.STAGING_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/release:${{ github.sha }}

  load-testing:
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Wait for staging to become healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              ${{ vars.STAGING_URL }}/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy"
              exit 0
            fi
            echo "Waiting for staging... attempt $i (status: $STATUS)"
            sleep 10
          done
          echo "Staging did not become healthy in time"
          exit 1

      - name: Run load test — scenario 1 (core user flow)
        run: k6 run backend/tests/load/scenario1.js

      - name: Run load test — scenario 2 (browsing flow)
        run: k6 run backend/tests/load/scenario2.js
